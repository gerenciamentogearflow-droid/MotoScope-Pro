<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#111827" />
      <stop offset="100%" stop-color="#030712" />
    </linearGradient>
    <linearGradient id="wave" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ef4444" />
      <stop offset="50%" stop-color="#dc2626" />
      <stop offset="100%" stop-color="#991b1b" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="16" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" fill="url(#bg)" />
  
  <g stroke="#374151" stroke-width="4" opacity="0.4">
    <line x1="0" y1="128" x2="512" y2="128" />
    <line x1="0" y1="256" x2="512" y2="256" />
    <line x1="0" y1="384" x2="512" y2="384" />
    <line x1="128" y1="0" x2="128" y2="512" />
    <line x1="256" y1="0" x2="256" y2="512" />
    <line x1="384" y1="0" x2="384" y2="512" />
  </g>

  <path d="M 64 256 C 128 64, 192 64, 256 256 C 320 448, 384 448, 448 256" fill="none" stroke="url(#wave)" stroke-width="40" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
</svg>
